name: Python CI

on:
  push:

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project dependencies
        shell: bash
        run: |
          set -euo pipefail
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          elif [ -f pyproject.toml ] || [ -f setup.py ]; then
            python -m pip install .
          else
            echo "No dependency manifest found; skipping project installation."
          fi

      - name: Lint with flake8
        shell: bash
        run: |
          set -euo pipefail
          if [ -f .flake8 ] || [ -f setup.cfg ] || [ -f pyproject.toml ] || [ -f tox.ini ]; then
            python -m pip install flake8
            python -m flake8 .
          else
            echo "No flake8 configuration found; skipping lint."
          fi

      - name: Test with pytest
        shell: bash
        run: |
          set -euo pipefail
          if find . -type f \( -name "test_*.py" -o -name "*_test.py" \) | grep -q .; then
            python -m pip install pytest
            pytest
          else
            echo "No tests found; skipping pytest."
          fi
